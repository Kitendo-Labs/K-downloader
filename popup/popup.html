<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Kitendo Stream Downloader</h1>
    <span id="stream-count" class="stream-count"></span>
  </div>
  <div id="stream-list"></div>
  <div id="empty-state" class="empty" hidden>
    <div class="empty-icon">&#9673;</div>
    No streams detected on this tab
  </div>
  <div class="footer">
    <label class="concurrency">
      Parallel
      <input type="number" id="concurrency" min="1" max="16" step="1" value="8">
    </label>
    <span id="version" class="version"></span>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
